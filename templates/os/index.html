<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOXIBH OS</title>
  <meta name="theme-color" content="#020408">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/os/os.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css">
</head>
<body>
  <div id="os-root" class="os-root">
    <div id="boot-screen" class="boot-screen">
      <div class="boot-core">
        <div class="boot-mark">TOXIBH OS</div>
        <div class="boot-bar"><span id="boot-progress"></span></div>
        <div id="boot-status" class="boot-status">Initializing kernel modules...</div>
      </div>
    </div>

    <div id="lock-screen" class="lock-screen hidden">
      <div class="lock-noise"></div>
      <div class="lock-panel glass-panel">
        <div class="lock-time" id="lock-time">00:00</div>
        <div class="lock-date" id="lock-date">---</div>
        <label for="pin-input" class="lock-label">Enter PIN</label>
        <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="0000">
        <button id="unlock-btn" class="unlock-btn">Unlock</button>
        <div id="lock-error" class="lock-error"></div>
        <a class="lock-link" href="/">Return to Portfolio</a>
      </div>
    </div>

    <div id="desktop" class="desktop hidden wallpaper-default">
      <div id="desktop-glow"></div>
      <div id="desktop-icons" class="desktop-icons"></div>
      <div id="window-layer" class="window-layer"></div>
      <aside id="start-menu" class="start-menu hidden glass-panel"></aside>
      <footer id="taskbar" class="taskbar glass-panel">
        <button id="start-btn" class="taskbar-start">Start</button>
        <div id="taskbar-apps" class="taskbar-apps"></div>
        <div class="taskbar-right">
          <button id="fullscreen-btn" class="taskbar-action" type="button">Fullscreen</button>
          <span id="taskbar-clock">00:00</span>
        </div>
      </footer>
    </div>

    <template id="window-template">
      <section class="window os-window glass-panel" data-app-window>
        <header class="window-header" data-drag-handle>
          <div class="window-title">App</div>
          <div class="window-controls">
            <button type="button" class="win-min" data-action="minimize">_</button>
            <button type="button" class="win-max" data-action="maximize">▢</button>
            <button type="button" class="win-close" data-action="close">x</button>
          </div>
        </header>
        <div class="window-body"></div>
      </section>
    </template>
  </div>

  <script type="module" src="/static/os/js/desktop.js"></script>
</body>
</html>
