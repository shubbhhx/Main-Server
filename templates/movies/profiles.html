<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToxibhFlix — Who's Watching?</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎬%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/movies/theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; min-height: 100%; background: var(--dark); }
  body {
    font-family: 'Rajdhani', sans-serif;
    color: #e0f7ff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px;
    position: relative;
  }

  .back-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--magenta);
    background: none;
    border: 1px solid var(--magenta);
    padding: 7px 14px;
    cursor: pointer;
    text-decoration: none;
    transition: .25s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    clip-path: polygon(9px 0,100% 0,calc(100% - 9px) 100%,0 100%);
  }
  .back-btn:hover {
    color: #fff;
    border-color: var(--magenta);
    background: rgba(255,0,110,.1);
    box-shadow: var(--glow-m);
  }

  .profiles-wrap { position: relative; z-index: 2; text-align: center; width: 100%; max-width: 900px; }

  /* ── LOGO ── */
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 900;
    color: var(--cyan);
    letter-spacing: .28em;
    text-shadow: var(--glow);
    margin-bottom: 12px;
    animation: neonFlicker 1.5s infinite alternate;
  }
  .logo span { color: rgba(224,247,255,.7); font-size: 0.55em; letter-spacing: 0.25em; vertical-align: super; }

  @keyframes neonFlicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow: var(--glow), 0 0 10px var(--cyan), 0 0 20px var(--cyan);
      opacity: 1;
    }
    20%,24%,55% { text-shadow: none; opacity: .25; }
  }

  .heading {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    font-weight: 400;
    color: rgba(224,247,255,.8);
    letter-spacing: .06em;
    margin-bottom: 48px;
  }

  .active-profile-strip {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: -14px auto 30px;
    padding: 10px 14px;
    border: 1px solid rgba(0,245,255,.24);
    background: rgba(0,245,255,.06);
    border-radius: 8px;
    width: fit-content;
    max-width: min(100%, 740px);
    flex-wrap: wrap;
  }
  .active-profile-strip.show { display: inline-flex; }
  .active-profile-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .08em;
    color: rgba(224,247,255,.9);
    text-transform: uppercase;
  }
  .active-profile-name {
    color: var(--cyan);
    text-shadow: var(--glow);
  }
  .continue-btn {
    border: 1px solid rgba(0,245,255,.35);
    background: rgba(0,245,255,.14);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: .2s ease;
  }
  .continue-btn:hover {
    box-shadow: var(--glow);
    background: rgba(0,245,255,.2);
  }

  /* ── PROFILE GRID ── */
  .profiles-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 44px; }

  .profile-item {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .profile-item:hover { transform: scale(1.1) translateY(-5px); }
  .profile-item:hover .avatar {
    border-color: var(--cyan);
    box-shadow: var(--glow), 0 0 30px rgba(0,245,255,.25);
  }
  .profile-item:hover .pname { color: var(--cyan); text-shadow: var(--glow); }

  .avatar {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(0,245,255,.18);
    display: flex; align-items: center; justify-content: center;
    transition: border-color .3s, box-shadow .3s;
    position: relative; overflow: hidden;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .profile-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
  }
  .avatar::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,.07), transparent);
  }

  /* Unique avatar gradients — portfolio dark palette */
  .profile-item:nth-child(1) .avatar { background: linear-gradient(135deg, #020408, #040d1a); }
  .profile-item:nth-child(2) .avatar { background: linear-gradient(135deg, #04020a, #0a0422); }
  .profile-item:nth-child(3) .avatar { background: linear-gradient(135deg, #020408, #021408); }
  .profile-item:nth-child(4) .avatar { background: linear-gradient(135deg, #04020a, #140a02); }
  .profile-item:nth-child(5) .avatar { background: rgba(0,245,255,.04); border-style: dashed; border-color: rgba(0,245,255,.2); }

  .pname {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: .1em;
    color: rgba(224,247,255,.55);
    text-transform: uppercase;
    transition: color .25s, text-shadow .25s;
  }

  .profile-actions { display: flex; gap: 8px; }
  .profile-edit-btn {
    border: 1px solid rgba(0,245,255,.35);
    background: rgba(0,245,255,.1);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: .08em;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .profile-edit-btn:hover { box-shadow: var(--glow); }

  .profile-modal {
    position: fixed;
    inset: 0;
    z-index: 999999;
    background: rgba(2,4,8,.82);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .profile-modal.open { display: flex; }
  .profile-modal-card {
    width: min(560px, 100%);
    background: rgba(2,4,8,.98);
    border: 1px solid rgba(0,245,255,.35);
    border-radius: 12px;
    padding: 18px;
  }
  .profile-modal-title {
    font-family: 'Orbitron', monospace;
    margin-bottom: 12px;
  }
  .profile-input {
    width: 100%;
    background: rgba(0,245,255,.05);
    color: #e0f7ff;
    border: 1px solid rgba(0,245,255,.25);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 1rem;
    margin-bottom: 12px;
  }
  .photo-upload-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .photo-upload-row input[type="file"] {
    flex: 1;
    color: rgba(224,247,255,.85);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
  }
  .avatar-picker {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .avatar-pick {
    border: 2px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    overflow: hidden;
    background: transparent;
    padding: 0;
  }
  .avatar-pick img { width: 100%; display: block; aspect-ratio: 1 / 1; object-fit: cover; }
  .avatar-pick.active { border-color: var(--cyan); box-shadow: var(--glow); }
  .profile-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── MANAGE BUTTON — portfolio secondary style ── */
  .manage-btn {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .18em;
    color: rgba(224,247,255,.45);
    border: 1px solid rgba(0,245,255,.2);
    padding: 9px 28px;
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
    background: none;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  }
  .manage-btn:hover {
    color: var(--cyan);
    border-color: var(--cyan);
    background: rgba(0,245,255,.06);
    box-shadow: var(--glow);
  }

  /* ── TORRENT / SECONDARY LINK ── */
  .action-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .15em;
    color: var(--magenta);
    border: 1px solid rgba(255,0,110,.35);
    padding: 9px 24px;
    text-decoration: none;
    text-transform: uppercase;
    transition: all .25s;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    background: rgba(255,0,110,.04);
    margin-top: 12px;
  }
  .action-link:hover {
    color: #fff;
    border-color: var(--magenta);
    background: rgba(255,0,110,.1);
    box-shadow: var(--glow-m);
  }

  /* ── FLASH TRANSITION ── */
  #flash { position: fixed; inset: 0; z-index: 9999; background: var(--dark); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  #flash.on { opacity: 1; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(2,4,8,.96);
    border: 1px solid rgba(0,245,255,.3);
    backdrop-filter: blur(12px);
    padding: 11px 22px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    color: var(--cyan);
    text-shadow: var(--glow);
    z-index: 99999;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) { .avatar { width: 90px; height: 90px; font-size: 2.8rem; } }
</style>
</head>
<body>

<div class="profiles-wrap">
  <div class="logo">TOXIBH<span>FLIX</span></div>
  <div class="heading">Who's Watching?</div>

  <div class="active-profile-strip" id="active-profile-strip">
    <div class="active-profile-text">Welcome back, <span class="active-profile-name" id="active-profile-name">Guest</span></div>
    <button type="button" class="continue-btn" id="continue-profile-btn" onclick="continueWithActiveProfile()">Continue</button>
  </div>

  <div class="profiles-grid" id="profiles-grid">
    <!-- Profiles loaded from API or defaults -->
  </div>

  <div style="margin-top:6px">
    <button type="button" class="manage-btn" onclick="openCreateModal()">+ Add Profile</button>
  </div>

  <div style="margin-top:12px">
    <a href="/profile" class="action-link">👤 Profile Dashboard</a>
  </div>

  <div style="margin-top:12px">
    <a href="/movies/torrent" class="action-link">🧲 Torrent Stream</a>
  </div>

  <div style="margin-top:12px">
    <a href="/" class="action-link">← Portfolio</a>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<div class="profile-modal" id="profile-modal" role="dialog" aria-modal="true" aria-label="Edit profile">
  <div class="profile-modal-card">
    <div class="profile-modal-title" id="profile-modal-title">Edit Profile</div>
    <input class="profile-input" id="profile-name-input" type="text" maxlength="40" placeholder="Profile name">
    <div class="photo-upload-row">
      <input type="file" id="profilePhoto" accept="image/png,image/jpeg,image/webp">
      <button type="button" class="profile-edit-btn" onclick="uploadProfilePhoto()">Upload</button>
    </div>
    <div class="avatar-picker" id="avatar-picker"></div>
    <div class="profile-modal-actions">
      <button type="button" class="manage-btn" onclick="closeProfileModal()">Cancel</button>
      <button type="button" class="continue-btn" onclick="saveProfileModal()">Save</button>
    </div>
  </div>
</div>

<script src="/movies/script.js?v=5"></script>
<script>
  const DEFAULT_AVATARS = [
    '/static/default-avatar.png',
    '/static/avatars/avatar1.png',
    '/static/avatars/avatar2.png',
    '/static/avatars/avatar3.png',
    '/static/avatars/avatar4.png',
    '/static/avatars/avatar5.png'
  ];

  let loadedProfiles = [];
  let modalMode = 'create';
  let editingProfileId = '';
  let selectedAvatarUrl = DEFAULT_AVATARS[0];
  let currentSelectedProfileId = '';

  // ── INJECT PORTFOLIO BACKGROUND FX ──────────────────────────
  (function() {
    const CYAN = '#00f5ff', MAGENTA = '#ff006e';
    if (!document.getElementById('grid-bg')) {
      const g = document.createElement('div'); g.id = 'grid-bg'; document.body.prepend(g);
    }
    if (!document.getElementById('scanline')) {
      const s = document.createElement('div'); s.id = 'scanline'; document.body.prepend(s);
    }
    if (!document.getElementById('particle-canvas')) {
      const canvas = document.createElement('canvas');
      canvas.id = 'particle-canvas';
      document.body.prepend(canvas);
      const ctx = canvas.getContext('2d');
      let W, H;
      const particles = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - .5) * .5, vy: (Math.random() - .5) * .5,
          r: Math.random() * 1.5 + .5,
          color: Math.random() < .7 ? CYAN : MAGENTA,
          opacity: Math.random() * .4 + .1
        });
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity; ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x, dy = p.y - q.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 130) {
              ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = CYAN; ctx.globalAlpha = (1 - d / 130) * .08;
              ctx.lineWidth = .5; ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    }
  })();

  function escapeHtml(input) {
    return String(input || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getActiveProfileId() {
    return String(currentSelectedProfileId || '').trim();
  }

  function normalizeAvatarUrl(rawUrl) {
    const cleaned = String(rawUrl || '').trim();
    if (!cleaned) return DEFAULT_AVATARS[0];
    if (cleaned.startsWith('/static/profile_photos/')) return cleaned;
    if (DEFAULT_AVATARS.includes(cleaned)) return cleaned;
    return DEFAULT_AVATARS[0];
  }

  function withAvatarCacheBust(url) {
    const normalized = normalizeAvatarUrl(url);
    if (!normalized.startsWith('/static/profile_photos/')) return normalized;
    return `${normalized}${normalized.includes('?') ? '&' : '?'}t=${Date.now()}`;
  }

  function renderAvatarPicker() {
    const picker = document.getElementById('avatar-picker');
    if (!picker) return;
    picker.innerHTML = DEFAULT_AVATARS.map((url) => `
      <button type="button" class="avatar-pick ${selectedAvatarUrl === url ? 'active' : ''}" data-avatar="${url}">
        <img src="${url}" alt="Avatar">
      </button>
    `).join('');
    picker.querySelectorAll('.avatar-pick').forEach((btn) => {
      btn.addEventListener('click', () => {
        selectedAvatarUrl = btn.getAttribute('data-avatar') || DEFAULT_AVATARS[0];
        renderAvatarPicker();
      });
    });
  }

  function openCreateModal() {
    modalMode = 'create';
    editingProfileId = '';
    selectedAvatarUrl = DEFAULT_AVATARS[0];
    const title = document.getElementById('profile-modal-title');
    const nameInput = document.getElementById('profile-name-input');
    if (title) title.textContent = 'Create Profile';
    if (nameInput) nameInput.value = '';
    const input = document.getElementById('profilePhoto');
    if (input) input.value = '';
    renderAvatarPicker();
    document.getElementById('profile-modal')?.classList.add('open');
  }

  function openEditModal(profileId) {
    const p = loadedProfiles.find((x) => String(x.id) === String(profileId));
    if (!p) return;
    modalMode = 'edit';
    editingProfileId = String(p.id || '');
    selectedAvatarUrl = normalizeAvatarUrl(p.avatar_url);
    const title = document.getElementById('profile-modal-title');
    const nameInput = document.getElementById('profile-name-input');
    if (title) title.textContent = `Edit ${p.name}`;
    if (nameInput) nameInput.value = p.name || '';
    const input = document.getElementById('profilePhoto');
    if (input) input.value = '';
    renderAvatarPicker();
    document.getElementById('profile-modal')?.classList.add('open');
  }

  async function uploadProfilePhoto() {
    const fileInput = document.getElementById('profilePhoto');
    const file = fileInput && fileInput.files ? fileInput.files[0] : null;
    if (!file) {
      showProfileToast('⚠ Choose a photo first.');
      return;
    }
    if (!editingProfileId) {
      showProfileToast('⚠ Select an existing profile to upload a photo.');
      return;
    }

    const formData = new FormData();
    formData.append('photo', file);
    formData.append('profile_id', editingProfileId);

    try {
      const res = await fetch('/api/upload-profile-photo', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (!res.ok) {
        showProfileToast(`⚠ ${data.error || 'Upload failed.'}`);
        return;
      }
      selectedAvatarUrl = normalizeAvatarUrl(data.avatar_url || selectedAvatarUrl);

      const idx = loadedProfiles.findIndex((p) => String(p.id || '') === String(editingProfileId || ''));
      if (idx >= 0) {
        loadedProfiles[idx].avatar_url = selectedAvatarUrl;
      }

      await loadProfiles();
      renderAvatarPicker();
      showProfileToast('✓ Photo uploaded');
    } catch (e) {
      showProfileToast('⚠ Upload failed.');
    }
  }

  function closeProfileModal() {
    document.getElementById('profile-modal')?.classList.remove('open');
  }

  async function saveProfileModal() {
    const nameInput = document.getElementById('profile-name-input');
    const name = (nameInput?.value || '').trim();
    if (!name) {
      showProfileToast('⚠ Profile name is required.');
      return;
    }

    const url = modalMode === 'edit' ? '/api/profiles/update' : '/api/profiles/create';
    const body = modalMode === 'edit'
      ? { id: editingProfileId, name, avatar_url: normalizeAvatarUrl(selectedAvatarUrl) }
      : { name, avatar_url: normalizeAvatarUrl(selectedAvatarUrl) };

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) {
        showProfileToast(`⚠ ${data.error || 'Unable to save profile.'}`);
        return;
      }
      closeProfileModal();
      await loadProfiles();
      showProfileToast('✓ Profile saved');
    } catch (e) {
      showProfileToast('⚠ Unable to save profile right now.');
    }
  }

  async function loadProfiles() {
    let profiles = [];
    try {
      const r = await fetch('/api/profiles');
      if (r.ok) {
        const data = await r.json();
        if (Array.isArray(data)) profiles = data;
      }
    } catch(e) {}

    profiles = profiles.map(p => ({
      id: p.id || '',
      name: p.name || p.profile_name || 'Profile',
      avatar_url: normalizeAvatarUrl(p.avatar_url || p.avatar || DEFAULT_AVATARS[0]),
      is_default: !!p.is_default
    }));

    loadedProfiles = profiles;
    renderActiveProfileStrip();

    const grid = document.getElementById('profiles-grid');
    grid.innerHTML = profiles.map((p) => `
      <div class="profile-item" onclick="handleSelectProfile('${p.id || ''}')">
        <div class="avatar"><img src="${withAvatarCacheBust(p.avatar_url)}" alt="${escapeHtml(p.name)}" onerror="this.onerror=null;this.src='/static/default-avatar.png'"></div>
        <div class="pname profile-name">${escapeHtml(p.name)}</div>
        <div class="profile-actions">
          <button type="button" class="profile-edit-btn" onclick="event.stopPropagation();openEditModal('${p.id || ''}')">Edit</button>
        </div>
      </div>
    `).join('');

    const activeProfile = await resolveActiveProfile();
    currentSelectedProfileId = (activeProfile && activeProfile.id) ? String(activeProfile.id) : '';

    if (!currentSelectedProfileId && profiles.length) {
      const defaultProfile = profiles.find(p => !!p.is_default) || profiles.find(p => String(p.name || '').toLowerCase() === 'guest') || profiles[0];
      currentSelectedProfileId = String(defaultProfile.id || '');
      await setActiveProfile(currentSelectedProfileId);
    } else if (currentSelectedProfileId && !profiles.some(p => String(p.id) === currentSelectedProfileId) && profiles.length) {
      currentSelectedProfileId = String((profiles[0] && profiles[0].id) || '');
      await setActiveProfile(currentSelectedProfileId);
    }

    if (profiles.length) {
      renderActiveProfileStrip();
    }
  }

  async function setActiveProfile(profileId) {
    const pid = String(profileId || '').trim();
    if (!pid) return null;
    try {
      const res = await fetch('/api/profile/active', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profile_id: pid })
      });
      const data = await res.json();
      if (!res.ok || !data.profile) return null;
      const p = data.profile;
      const normalized = {
        id: p.id,
        name: p.name,
        avatarUrl: withAvatarCacheBust(p.avatar_url || p.avatar || DEFAULT_AVATARS[0])
      };
      window.__activeProfile = normalized;
      currentSelectedProfileId = String(p.id || '');
      return normalized;
    } catch (e) {
      return null;
    }
  }

  async function handleSelectProfile(id) {
    await setActiveProfile(id || '');
    document.getElementById('flash').classList.add('on');
    setTimeout(() => { window.location.href = '/movies/browse'; }, 450);
  }

  function handleGuestLogin() {
    const guest = loadedProfiles.find(p => String(p.name || '').toLowerCase() === 'guest' || String(p.id || '').toLowerCase() === 'guest');
    if (guest) {
      handleSelectProfile(guest.id || 'guest', guest.name || 'Guest', guest.emoji || '👤');
      return;
    }
    showProfileToast('⚠ Guest profile not found.');
  }

  function showProfileToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function continueWithActiveProfile() {
    const activeId = getActiveProfileId();
    if (!activeId) {
      showProfileToast('⚠ No active profile found.');
      return;
    }

    const match = loadedProfiles.find(p => {
      return String(p.id || '') === String(activeId || '');
    });

    if (!match) {
      showProfileToast('⚠ Previously selected profile is unavailable.');
      return;
    }

    handleSelectProfile(match.id || '');
  }

  function renderActiveProfileStrip() {
    const strip = document.getElementById('active-profile-strip');
    const activeName = document.getElementById('active-profile-name');
    const continueBtn = document.getElementById('continue-profile-btn');
    const activeId = getActiveProfileId();

    if (!strip || !activeName || !continueBtn || !activeId) {
      if (strip) strip.classList.remove('show');
      return;
    }

    const match = loadedProfiles.find(p => {
      return String(p.id || '') === String(activeId || '');
    });

    if (!match) {
      strip.classList.remove('show');
      return;
    }

    activeName.textContent = match.name;
    strip.classList.add('show');
    setTimeout(() => continueBtn.focus(), 0);
  }

  window.addEventListener('keydown', function(event) {
    if (event.key !== 'Enter') return;
    const strip = document.getElementById('active-profile-strip');
    if (!strip || !strip.classList.contains('show')) return;

    const tag = (document.activeElement && document.activeElement.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;

    event.preventDefault();
    continueWithActiveProfile();
  });

  if (typeof bindGlobalSearchOverlay === 'function') bindGlobalSearchOverlay();

  loadProfiles();
</script>
</body>
</html>
