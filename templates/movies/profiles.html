<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToxibhFlix — Who's Watching?</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎬%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/movies/theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; min-height: 100%; background: var(--dark); }
  body {
    font-family: 'Rajdhani', sans-serif;
    color: #e0f7ff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px;
    position: relative;
  }

  .profiles-wrap { position: relative; z-index: 2; text-align: center; width: 100%; max-width: 900px; }

  /* ── LOGO ── */
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 900;
    color: var(--cyan);
    letter-spacing: .28em;
    text-shadow: var(--glow);
    margin-bottom: 12px;
    animation: neonFlicker 1.5s infinite alternate;
  }
  .logo span { color: rgba(224,247,255,.7); font-size: 0.55em; letter-spacing: 0.25em; vertical-align: super; }

  @keyframes neonFlicker {
    0%,19%,21%,23%,25%,54%,56%,100% {
      text-shadow: var(--glow), 0 0 10px var(--cyan), 0 0 20px var(--cyan);
      opacity: 1;
    }
    20%,24%,55% { text-shadow: none; opacity: .25; }
  }

  .heading {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    font-weight: 400;
    color: rgba(224,247,255,.8);
    letter-spacing: .06em;
    margin-bottom: 48px;
  }

  /* ── PROFILE GRID ── */
  .profiles-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 44px; }

  .profile-item {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .profile-item:hover { transform: scale(1.1) translateY(-5px); }
  .profile-item:hover .avatar {
    border-color: var(--cyan);
    box-shadow: var(--glow), 0 0 30px rgba(0,245,255,.25);
  }
  .profile-item:hover .pname { color: var(--cyan); text-shadow: var(--glow); }

  .avatar {
    width: 120px; height: 120px;
    border-radius: 6px;
    border: 2px solid rgba(0,245,255,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    transition: border-color .3s, box-shadow .3s;
    position: relative; overflow: hidden;
  }
  .avatar::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,.07), transparent);
  }

  /* Unique avatar gradients — portfolio dark palette */
  .profile-item:nth-child(1) .avatar { background: linear-gradient(135deg, #020408, #040d1a); }
  .profile-item:nth-child(2) .avatar { background: linear-gradient(135deg, #04020a, #0a0422); }
  .profile-item:nth-child(3) .avatar { background: linear-gradient(135deg, #020408, #021408); }
  .profile-item:nth-child(4) .avatar { background: linear-gradient(135deg, #04020a, #140a02); }
  .profile-item:nth-child(5) .avatar { background: rgba(0,245,255,.04); border-style: dashed; border-color: rgba(0,245,255,.2); }

  .pname {
    font-family: 'Share Tech Mono', monospace;
    font-size: .78rem;
    letter-spacing: .1em;
    color: rgba(224,247,255,.55);
    text-transform: uppercase;
    transition: color .25s, text-shadow .25s;
  }

  /* ── MANAGE BUTTON — portfolio secondary style ── */
  .manage-btn {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .18em;
    color: rgba(224,247,255,.45);
    border: 1px solid rgba(0,245,255,.2);
    padding: 9px 28px;
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
    background: none;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  }
  .manage-btn:hover {
    color: var(--cyan);
    border-color: var(--cyan);
    background: rgba(0,245,255,.06);
    box-shadow: var(--glow);
  }

  /* ── TORRENT / SECONDARY LINK ── */
  .action-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    letter-spacing: .15em;
    color: var(--magenta);
    border: 1px solid rgba(255,0,110,.35);
    padding: 9px 24px;
    text-decoration: none;
    text-transform: uppercase;
    transition: all .25s;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    background: rgba(255,0,110,.04);
    margin-top: 12px;
  }
  .action-link:hover {
    color: #fff;
    border-color: var(--magenta);
    background: rgba(255,0,110,.1);
    box-shadow: var(--glow-m);
  }

  /* ── FLASH TRANSITION ── */
  #flash { position: fixed; inset: 0; z-index: 9999; background: var(--dark); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  #flash.on { opacity: 1; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(2,4,8,.96);
    border: 1px solid rgba(0,245,255,.3);
    backdrop-filter: blur(12px);
    padding: 11px 22px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    color: var(--cyan);
    text-shadow: var(--glow);
    z-index: 99999;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) { .avatar { width: 90px; height: 90px; font-size: 2.8rem; } }
</style>
</head>
<body>

<div class="profiles-wrap">
  <div class="logo">TOXIBH<span>FLIX</span></div>
  <div class="heading">Who's Watching?</div>

  <div class="profiles-grid" id="profiles-grid">
    <!-- Profiles loaded from API or defaults -->
  </div>

  <div style="margin-top:12px">
    <a href="/movies/torrent" class="action-link">🧲 Torrent Stream</a>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<script>
  // ── INJECT PORTFOLIO BACKGROUND FX ──────────────────────────
  (function() {
    const CYAN = '#00f5ff', MAGENTA = '#ff006e';
    if (!document.getElementById('grid-bg')) {
      const g = document.createElement('div'); g.id = 'grid-bg'; document.body.prepend(g);
    }
    if (!document.getElementById('scanline')) {
      const s = document.createElement('div'); s.id = 'scanline'; document.body.prepend(s);
    }
    if (!document.getElementById('particle-canvas')) {
      const canvas = document.createElement('canvas');
      canvas.id = 'particle-canvas';
      document.body.prepend(canvas);
      const ctx = canvas.getContext('2d');
      let W, H;
      const particles = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - .5) * .5, vy: (Math.random() - .5) * .5,
          r: Math.random() * 1.5 + .5,
          color: Math.random() < .7 ? CYAN : MAGENTA,
          opacity: Math.random() * .4 + .1
        });
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity; ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x, dy = p.y - q.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 130) {
              ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = CYAN; ctx.globalAlpha = (1 - d / 130) * .08;
              ctx.lineWidth = .5; ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    }
  })();

  const DEFAULT_PROFILES = [
    { name: 'Shubham',     emoji: '🤖' },
    { name: 'Chill Mode',  emoji: '🎮' },
    { name: 'Night Owl',   emoji: '🌙' },
    { name: 'Action Fan',  emoji: '⚡' },
  ];

  async function loadProfiles() {
    let profiles = DEFAULT_PROFILES;
    try {
      const r = await fetch('/api/movies/profiles');
      if (r.ok) {
        const data = await r.json();
        if (data && data.length) profiles = data;
      }
    } catch(e) {}

    const grid = document.getElementById('profiles-grid');
    grid.innerHTML = profiles.map((p, i) => `
      <div class="profile-item" onclick="selectProfile('${p.id || ''}','${p.name}','${p.emoji}')">
        <div class="avatar">${p.emoji}</div>
        <div class="pname">${p.name}</div>
      </div>
    `).join('');
  }

  function selectProfile(id, name, emoji) {
    localStorage.setItem('toxibhflix_profile', JSON.stringify({ id, name, emoji, ts: Date.now() }));
    document.getElementById('flash').classList.add('on');
    setTimeout(() => { window.location.href = '/movies/browse'; }, 450);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  loadProfiles();
</script>
</body>
</html>
