<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToxibhFlix — Who's Watching?</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎬%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; background: #141414; }
  body { font-family: 'Rajdhani', sans-serif; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px; }

  /* animated BG */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(229,9,20,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 20%, rgba(229,9,20,0.05) 0%, transparent 45%);
  }
  /* scanlines */
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  }

  .profiles-wrap { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 900px; }

  /* Logo */
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 900;
    color: #e50914;
    letter-spacing: 0.05em;
    text-shadow: 0 0 25px rgba(229,9,20,0.5);
    margin-bottom: 12px;
  }
  .logo span { color: rgba(255,255,255,0.82); font-size: 0.55em; letter-spacing: 0.25em; vertical-align: super; }

  .heading {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.06em;
    margin-bottom: 48px;
  }

  /* Profile grid */
  .profiles-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 44px; }

  .profile-item {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .profile-item:hover { transform: scale(1.1) translateY(-5px); }
  .profile-item:hover .avatar { border-color: #fff; }
  .profile-item:hover .pname { color: #fff; }

  .avatar {
    width: 120px; height: 120px;
    border-radius: 6px;
    border: 3px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    transition: border-color 0.25s;
    position: relative; overflow: hidden;
  }
  .avatar::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.07), transparent);
  }

  /* Unique avatar colours */
  .profile-item:nth-child(1) .avatar { background: linear-gradient(135deg, #0d0d2b, #1a1a6e); }
  .profile-item:nth-child(2) .avatar { background: linear-gradient(135deg, #1a0005, #6e0010); }
  .profile-item:nth-child(3) .avatar { background: linear-gradient(135deg, #0d1a0d, #0a4a0a); }
  .profile-item:nth-child(4) .avatar { background: linear-gradient(135deg, #1a100d, #6e3010); }
  .profile-item:nth-child(5) .avatar { background: rgba(255,255,255,0.06); border-style: dashed; border-color: rgba(255,255,255,0.2); }

  .pname {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    transition: color 0.25s;
  }

  .manage-btn {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 9px 28px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    background: none;
  }
  .manage-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.07); }

  /* Flash transition */
  #flash { position: fixed; inset: 0; z-index: 9999; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  #flash.on { opacity: 1; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(20,20,20,0.95);
    border: 1px solid rgba(229,9,20,0.35);
    backdrop-filter: blur(12px);
    padding: 11px 22px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem; color: #fff;
    z-index: 99999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) { .avatar { width: 90px; height: 90px; font-size: 2.8rem; } }
</style>
</head>
<body>

<div class="profiles-wrap">
  <div class="logo">TOXIBH<span>FLIX</span></div>
  <div class="heading">Who's Watching?</div>

  <div class="profiles-grid" id="profiles-grid">
    <!-- Profiles loaded from API or defaults -->
  </div>

  <button class="manage-btn" onclick="showToast('Manage profiles in the Admin panel')">Manage Profiles</button>
  <div style="margin-top:20px">
    <a href="/movies/torrent" style="
      display:inline-flex;align-items:center;gap:8px;
      font-family:'Share Tech Mono',monospace;font-size:0.72rem;
      letter-spacing:0.15em;color:rgba(229,9,20,0.8);
      border:1px solid rgba(229,9,20,0.3);padding:9px 24px;
      text-decoration:none;text-transform:uppercase;
      transition:all 0.25s;
    " onmouseover="this.style.color='#e50914';this.style.borderColor='rgba(229,9,20,0.8)';this.style.background='rgba(229,9,20,0.08)'"
       onmouseout="this.style.color='rgba(229,9,20,0.8)';this.style.borderColor='rgba(229,9,20,0.3)';this.style.background='none'">
      🧲 Torrent Stream
    </a>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<script>
  const DEFAULT_PROFILES = [
    { name: 'Shubham',     emoji: '🤖' },
    { name: 'Chill Mode',  emoji: '🎮' },
    { name: 'Night Owl',   emoji: '🌙' },
    { name: 'Action Fan',  emoji: '⚡' },
  ];

  async function loadProfiles() {
    let profiles = DEFAULT_PROFILES;
    try {
      const r = await fetch('/api/movies/profiles');
      if (r.ok) {
        const data = await r.json();
        if (data && data.length) profiles = data;
      }
    } catch(e) {}

    const grid = document.getElementById('profiles-grid');
    grid.innerHTML = profiles.map((p, i) => `
      <div class="profile-item" onclick="selectProfile('${p.name}','${p.emoji}')">
        <div class="avatar">${p.emoji}</div>
        <div class="pname">${p.name}</div>
      </div>
    `).join('') + `
      <div class="profile-item" onclick="showToast('Use Admin panel to add profiles')">
        <div class="avatar" style="font-size:2rem;color:rgba(255,255,255,0.3);">+</div>
        <div class="pname">Add Profile</div>
      </div>`;
  }

  function selectProfile(name, emoji) {
    localStorage.setItem('toxibhflix_profile', JSON.stringify({ name, emoji, ts: Date.now() }));
    document.getElementById('flash').classList.add('on');
    setTimeout(() => { window.location.href = '/movies/browse'; }, 450);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  loadProfiles();
</script>
</body>
</html>
