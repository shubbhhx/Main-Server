<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch — ToxibhFlix</title>
<meta name="description" content="Watch TV shows on ToxibhFlix.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📺%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/movies/theme.css">
<link rel="stylesheet" href="/movies/style.css">
<style>
  /* TV Watch-page extras */
  #watch-poster-wrap { position: relative; flex-shrink: 0; }
  #watch-poster {
    width: 160px;
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), var(--glow);
    border: 2px solid var(--cyan);
    display: block;
  }
  .watch-placeholder-poster {
    width: 160px; height: 240px;
    background: linear-gradient(135deg,var(--dark2),rgba(255,0,110,0.12));
    border: 2px solid var(--cyan); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 3rem;
  }
  #watch-tagline {
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
    color: rgba(255,0,110,0.75); font-style: italic;
    letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .watch-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }

  /* ── SEASON / EPISODE SELECTOR ────────────────────────────── */
  #tv-selector-section {
    padding: 32px 48px 0;
    max-width: 1400px;
    margin: 0 auto;
  }
  .selector-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--nf-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Season tabs */
  .season-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .season-tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    padding: 8px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--nf-muted);
    cursor: pointer;
    transition: var(--transition);
    text-transform: uppercase;
  }
  .season-tab:hover { border-color: var(--cyan); color: var(--cyan); }
  .season-tab.active {
    background: var(--cyan);
    border-color: var(--cyan);
    color: var(--dark);
    box-shadow: var(--glow);
  }

  /* Episode list */
  .ep-list-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--nf-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .episode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
    max-height: 480px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--nf-red) var(--nf-bg2);
  }
  .episode-card {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .episode-card:hover {
    background: rgba(0,245,255,0.08);
    border-color: var(--cyan);
    transform: translateY(-2px);
  }
  .episode-card.active-ep {
    border-color: var(--cyan);
    background: rgba(0,245,255,0.12);
  }
  .ep-thumb {
    flex-shrink: 0;
    width: 96px;
    height: 54px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--nf-bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: rgba(0,245,255,0.3);
    overflow: hidden;
  }
  .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ep-info { flex: 1; min-width: 0; }
  .ep-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--cyan);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .ep-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--nf-text);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ep-desc {
    font-size: 0.75rem;
    color: var(--nf-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ep-runtime {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--nf-muted);
    margin-top: 4px;
  }
  .ep-play-btn {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%) scale(0);
    width: 32px;
    height: 32px;
    background: var(--cyan);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    color: #fff;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .episode-card:hover .ep-play-btn { transform: translateY(-50%) scale(1); }

  #ep-loading {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--nf-muted);
    padding: 20px 0;
  }

  @media (max-width: 900px) {
    #tv-selector-section { padding: 20px 16px 0; }
    .episode-grid { grid-template-columns: 1fr; }
    #watch-poster { width: 120px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header id="site-header">
  <div class="header-left">
    <a class="logo" href="/movies">TOXIBH<span>FLIX</span></a>
    <nav class="header-nav">
      <a href="/movies/browse">Movies</a>
      <a href="/movies/tvshows" class="active">TV Shows</a>
    </nav>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="/movies/tvshows" class="back-btn">← All TV Shows</a>
    <a href="/movies" class="back-btn" id="profile-btn" style="display:flex;align-items:center;gap:6px;">👤 <span id="profile-name-display">Switch</span></a>
    <a href="/" class="back-btn">← Portfolio</a>
  </div>
</header>

<!-- SHOW HERO -->
<section id="watch-hero">
  <div class="watch-backdrop" id="watch-backdrop"></div>
  <div class="watch-vignette"></div>
  <div class="watch-hero-content">
    <div id="watch-poster-wrap">
      <img id="watch-poster" src="/static/img/no-poster.png" alt="" onerror="this.onerror=null;this.src='/static/img/no-poster.png'">
    </div>
    <div class="watch-meta-col">
      <div class="watch-badge">Now Streaming</div>
      <h1 class="watch-title" id="watch-title">Loading…</h1>
      <div id="watch-tagline"></div>
      <div class="watch-meta-row">
        <span class="watch-rating" id="watch-rating"></span>
        <span id="watch-year"></span>
        <span id="watch-seasons"></span>
        <span id="watch-status"></span>
      </div>
      <div class="watch-genres" id="watch-genres"></div>
      <p class="watch-overview" id="watch-overview"></p>
      <div class="watch-actions">
        <button class="btn-play" id="watch-btn">▶&nbsp;&nbsp;WATCH NOW</button>
        <button class="btn-info" id="watchlist-btn">+ WATCHLIST</button>
      </div>
    </div>
  </div>
</section>

<!-- TV SELECTOR (Season Tabs + Episode List) -->
<section id="tv-selector-section">

  <div class="selector-label">⚙ Select Season &amp; Episode</div>

  <!-- Season tabs -->
  <div class="season-tabs" id="season-tabs">
    <div class="loading-skeleton" style="width:80px;height:34px;flex-shrink:0;"></div>
    <div class="loading-skeleton" style="width:80px;height:34px;flex-shrink:0;"></div>
    <div class="loading-skeleton" style="width:80px;height:34px;flex-shrink:0;"></div>
  </div>

  <!-- Episode list -->
  <div class="ep-list-title" id="ep-list-title">Episodes</div>
  <div class="episode-grid" id="episode-grid">
    <div id="ep-loading">Loading episodes…</div>
  </div>

</section>

<!-- PLAYER SECTION -->
<section id="player-section">

  <!-- Resume banner -->
  <div class="resume-banner" id="resume-banner">
    <span>🕐 You left off — S<span id="resume-season"></span>E<span id="resume-episode"></span> at <strong id="resume-time"></strong></span>
    <div style="display:flex;gap:10px;">
      <button class="resume-btn" id="resume-btn">RESUME</button>
      <button class="resume-btn" id="watch-btn-fresh"
        style="background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.45);color:var(--magenta);">
        START OVER
      </button>
    </div>
  </div>

  <!-- Iframe container -->
  <div class="player-container" id="player-container">
    <div id="player-placeholder" style="
      height:580px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      background:linear-gradient(135deg,#0a0a0f,#140008);
      cursor:pointer;"
      onclick="document.getElementById('watch-btn').click()">
      <div style="font-size:5rem;opacity:0.25;">📺</div>
      <div style="font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:0.25em;color:rgba(0,245,255,0.65);text-transform:uppercase;">Click Watch Now or Select an Episode</div>
    </div>
  </div>

</section>

<!-- CAST -->
<section id="cast-section" class="row-section cast-section">
  <div class="row-title">🎠 Cast</div>
  <div class="cast-grid" id="cast-grid"></div>
</section>

<!-- RECOMMENDED -->
<section id="recommendations" class="row-section">
  <div class="row-title">📺 You Might Also Like</div>
  <div class="poster-row" id="row-recs"></div>
</section>

<!-- TOAST -->
<div id="toast"></div>

<script src="/movies/script.js?v=4"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const p = JSON.parse(localStorage.getItem('toxibhflix_profile') || 'null');
    if (p) {
      const nameEl = document.getElementById('profile-name-display');
      if (nameEl) nameEl.textContent = p.name;
    }
    initWatchTVPage();

    // Progress saved indicator
    let progressTimeout;
    window.addEventListener('message', function (event) {
      if (!event.data || typeof event.data !== 'object') return;
      if (event.data.type === 'timeupdate' && event.data.currentTime > 5) {
        const pi = document.getElementById('progress-indicator');
        const pt = document.getElementById('progress-text');
        if (pi) pi.style.display = 'flex';
        if (pt) pt.textContent = 'Progress saved (' + formatTime(event.data.currentTime) + ')';
        clearTimeout(progressTimeout);
        progressTimeout = setTimeout(() => { if (pi) pi.style.display = 'none'; }, 3000);
      }
    });
  });
</script>
</body>
</html>
