<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch — ToxibhFlix</title>
<meta name="description" content="Watch movies on ToxibhFlix.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎬%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/movies/theme.css">
<link rel="stylesheet" href="/movies/style.css">
<style>
  #watch-hero {
    height: 100vh;
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
    margin: 0;
    padding: 0;
    background: #05070d;
  }
  .watch-hero-controls {
    position: absolute;
    top: 92px;
    right: 28px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .watch-hero-audio-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(0,245,255,0.34);
    background: rgba(0,0,0,0.38);
    color: var(--nf-text);
    backdrop-filter: blur(10px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition);
  }
  .watch-hero-audio-btn:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.32);
    color: var(--cyan);
  }
  #watch-backdrop {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background-size: cover;
    background-position: center center;
    filter: brightness(0.5);
    transform: scale(1.02);
    z-index: 0;
  }
  #watch-trailer-layer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    min-width: 100%;
    min-height: 100%;
    overflow: hidden;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity .5s ease;
    pointer-events: none;
    z-index: 1;
  }
  #watch-trailer-layer.active {
    opacity: 1;
  }
  #watch-trailer-iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    min-width: 100%;
    min-height: 100%;
    border: 0;
    transform: translate(-50%, -50%) scale(1.22);
    pointer-events: none;
    filter: saturate(1.08) contrast(1.05) brightness(0.5);
  }
  .watch-hero-gradient {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top, #000 0%, transparent 50%),
      linear-gradient(to right, rgba(6,8,12,0.72) 0%, rgba(6,8,12,0.32) 52%, rgba(6,8,12,0.14) 100%);
    z-index: 2;
  }
  .watch-hero-content {
    position: absolute;
    left: 5%;
    bottom: 15%;
    z-index: 10;
    width: min(700px, calc(100vw - 10%));
    max-width: 700px;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  .watch-meta-col {
    max-width: 760px;
  }
  .watch-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 4.8vw, 4rem);
    line-height: 1.06;
    margin-bottom: 14px;
    color: #f2fbff;
    text-shadow: 0 0 22px rgba(0,245,255,0.2);
  }
  .watch-meta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    color: rgba(224,247,255,0.82);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .watch-rating { color: #ffe081; }
  .watch-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .genre-tag {
    border: 1px solid rgba(0,245,255,0.35);
    background: rgba(10,10,15,0.35);
    backdrop-filter: blur(6px);
    color: var(--nf-text);
    padding: 5px 10px;
    border-radius: 999px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: .08em;
  }
  .watch-overview {
    max-width: 720px;
    color: rgba(224,247,255,0.78);
    font-size: 1rem;
    line-height: 1.65;
    margin-bottom: 20px;
  }
  .watch-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .watch-btn-solid {
    min-height: 44px;
    padding: 0 24px;
    border: none;
    border-radius: 11px;
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan), #66fcff);
    color: #021318;
    cursor: pointer;
    box-shadow: var(--glow);
  }
  .watch-btn-glass {
    min-height: 44px;
    padding: 0 16px;
    border: 1px solid rgba(0,245,255,0.26);
    border-radius: 11px;
    color: var(--nf-text);
    background: rgba(10,10,15,0.45);
    backdrop-filter: blur(10px);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: var(--transition);
  }
  .watch-btn-glass:hover {
    border-color: rgba(0,245,255,0.6);
    box-shadow: 0 0 12px rgba(0,245,255,0.28);
  }
  #watchlist-btn {
    width: 44px;
    padding: 0;
    font-size: 1.05rem;
    font-weight: 700;
  }

  #watch-detail-shell {
    position: relative;
    z-index: 5;
    margin-top: 0;
    background: #000;
    padding: 28px 0 80px;
  }
  .cp-section {
    max-width: 1280px;
    margin: 0 auto 26px;
    padding: 0 48px;
  }
  .cp-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--nf-text);
    margin-bottom: 14px;
  }
  .cp-section-title::before {
    content: '';
    width: 3px;
    height: 20px;
    background: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.9);
  }

  #cast-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }
  .actor-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(15,15,20,0.62);
    border: 1px solid rgba(0,245,255,0.14);
    border-radius: 12px;
    padding: 10px 12px;
    backdrop-filter: blur(10px);
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .actor-card:hover {
    border-color: rgba(0,245,255,0.52);
    box-shadow: 0 0 10px rgba(0,255,255,0.5);
  }
  .actor-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.18);
    flex-shrink: 0;
  }
  .actor-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.67rem;
    color: var(--nf-text);
    margin-bottom: 4px;
  }
  .actor-character {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--nf-muted);
  }

  #row-recs {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 12px;
  }
  .watch-rec-card {
    position: relative;
    background: rgba(12,12,17,0.72);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .watch-rec-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,0,110,0.55);
    box-shadow: 0 0 16px rgba(255,0,110,0.22);
  }
  .watch-rec-poster {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
  }
  .watch-badge-left,
  .watch-badge-right {
    position: absolute;
    top: 8px;
    z-index: 2;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }
  .watch-badge-left {
    left: 8px;
    color: #09161b;
    background: rgba(0,245,255,0.9);
  }
  .watch-badge-right {
    right: 8px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .watch-rec-meta {
    padding: 10px;
  }
  .watch-rec-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    color: var(--nf-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .watch-rec-year {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--nf-muted);
  }

  #watch-poster { display: none; }

  @media (max-width: 1200px) {
    #row-recs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    #cast-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 900px) {
    .watch-hero-content {
      bottom: 10%;
      left: 4%;
      width: calc(100vw - 8%);
      max-width: none;
    }
    .cp-section { padding: 0 16px; }
    #cast-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    #row-recs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .watch-overview { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header id="site-header">
  <div class="header-left">
    <a class="logo" href="/movies">TOXIBH<span>FLIX</span></a>
    <nav class="header-nav">
      <a href="/movies/browse">Browse</a>
    </nav>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="back-btn search-overlay-trigger" aria-label="Open search">🔍 Search</button>
    <a href="/movies/browse" class="back-btn">← All Movies</a>
    <a href="/profile" class="back-btn" id="profile-btn" style="display:flex;align-items:center;gap:6px;">👤 <span id="profile-name-display">Switch</span></a>
    <a href="/" class="back-btn">← Portfolio</a>
  </div>
</header>

<!-- MOVIE HERO -->
<section id="watch-hero">
  <div id="watch-trailer-layer">
    <iframe id="watch-trailer-iframe" allow="autoplay; encrypted-media" title="Trailer Background"></iframe>
  </div>
  <div class="watch-backdrop" id="watch-backdrop"></div>
  <div class="watch-hero-gradient"></div>
  <div class="watch-hero-controls watch-idle-ui">
    <button type="button" class="watch-hero-audio-btn" id="watch-audio-toggle" aria-label="Unmute trailer" title="Unmute trailer">🔇</button>
  </div>
  <div class="watch-hero-content">
    <img id="watch-poster" src="/static/no-poster.png" alt="">
    <div class="watch-meta-col">
      <h1 class="watch-title" id="watch-title">Loading…</h1>
      <div class="watch-meta-row">
        <span class="watch-rating" id="watch-rating"></span>
        <span id="watch-year"></span>
        <span id="watch-runtime"></span>
      </div>
      <div class="watch-genres" id="watch-genres"></div>
      <p class="watch-overview" id="watch-overview"></p>
      <div class="watch-actions">
        <button class="watch-btn-solid" id="watch-btn">▶ Play</button>
        <button class="watch-btn-glass" id="watchlist-btn" data-icon-mode="1" title="Add to Watchlist" aria-label="Add to Watchlist">+</button>
        <button class="watch-btn-glass" id="download-btn">Download</button>
        <button class="watch-btn-glass" id="similars-btn">Similars</button>
      </div>
    </div>
  </div>
</section>

<div id="watch-detail-shell">

<section class="cp-section">
  <div class="resume-banner" id="resume-banner">
    <span>🕐 You left off at <strong id="resume-time"></strong></span>
    <div style="display:flex;gap:10px;">
      <button class="resume-btn" id="resume-btn">RESUME</button>
      <button class="resume-btn" id="watch-btn-fresh"
        style="background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.45);color:var(--magenta);">
        START OVER
      </button>
    </div>
  </div>
</section>

<!-- CAST -->
<section id="cast-section" class="cp-section">
  <div class="cp-section-title">Actors</div>
  <div id="cast-grid"></div>
</section>

<!-- RECOMMENDED -->
<section id="recommendations" class="cp-section">
  <div class="cp-section-title">You may like</div>
  <div id="row-recs"></div>
</section>
</div>
<!-- TOAST -->
<div id="toast"></div>

<script src="/movies/script.js?v=4"></script>
<script>
  document.addEventListener('DOMContentLoaded', async function () {
    const p = await resolveActiveProfile();
    const nameEl = document.getElementById('profile-name-display');
    if (nameEl && p) nameEl.textContent = p.name || 'Profile';
    initWatchPage().catch(() => {
      showToast('⚠ Server error. Please try again.');
    });

    // Progress saved indicator
    let progressTimeout;
    window.addEventListener('message', function (event) {
      if (!event.data || typeof event.data !== 'object') return;
      if (event.data.type === 'timeupdate' && event.data.currentTime > 5) {
        const pi = document.getElementById('progress-indicator');
        const pt = document.getElementById('progress-text');
        if (pi) pi.style.display = 'flex';
        if (pt) pt.textContent = 'Progress saved (' + formatTime(event.data.currentTime) + ')';
        clearTimeout(progressTimeout);
        progressTimeout = setTimeout(() => {
          if (pi) pi.style.display = 'none';
        }, 3000);
      }
    });
  });
</script>
</body>
</html>
