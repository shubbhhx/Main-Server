<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOXIBH OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/os/os.css">
</head>
<body>
  <div id="boot-screen" class="boot-screen">
    <div class="boot-core">
      <div class="boot-mark">TOXIBH OS</div>
      <div class="boot-bar"><span id="boot-progress"></span></div>
      <div id="boot-status" class="boot-status">Initializing kernel modules...</div>
    </div>
  </div>

  <div id="lock-screen" class="lock-screen hidden">
    <div class="lock-noise"></div>
    <div class="lock-panel">
      <div class="lock-time" id="lock-time">00:00</div>
      <div class="lock-date" id="lock-date">---</div>
      <label for="pin-input" class="lock-label">Enter PIN</label>
      <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="****">
      <button id="unlock-btn" class="unlock-btn">Unlock</button>
      <div id="lock-error" class="lock-error"></div>
      <a class="lock-link" href="/">Return to Portfolio</a>
    </div>
  </div>

  <div id="desktop" class="desktop hidden wallpaper-neon-grid">
    <div id="desktop-icons" class="desktop-icons">
      <button class="app-icon" data-app="flix"><span>🎬</span><small>Flix</small></button>
      <button class="app-icon" data-app="vault"><span>🗂</span><small>Vault</small></button>
      <button class="app-icon" data-app="pdf"><span>📄</span><small>PDF Tools</small></button>
      <button class="app-icon" data-app="image"><span>🖼</span><small>Image Editor</small></button>
      <button class="app-icon" data-app="code"><span>⌨</span><small>Code Runner</small></button>
      <button class="app-icon" data-app="chat"><span>💬</span><small>Chat</small></button>
      <button class="app-icon" data-app="terminal"><span>🖥</span><small>Terminal</small></button>
      <button class="app-icon" data-app="admin"><span>🛡</span><small>Admin Panel</small></button>
      <button class="app-icon" data-app="settings"><span>⚙</span><small>Settings</small></button>
    </div>

    <div id="window-layer" class="window-layer"></div>

    <aside id="start-menu" class="start-menu hidden">
      <div class="start-title">TOXIBH OS</div>
      <button class="start-item" data-app="flix">Flix</button>
      <button class="start-item" data-app="vault">Vault</button>
      <button class="start-item" data-app="pdf">PDF Tools</button>
      <button class="start-item" data-app="image">Image Editor</button>
      <button class="start-item" data-app="code">Code Runner</button>
      <button class="start-item" data-app="chat">Chat</button>
      <button class="start-item" data-app="terminal">Terminal</button>
      <button class="start-item" data-app="admin">Admin Panel</button>
      <button class="start-item" data-app="settings">Settings</button>
      <hr>
      <a class="start-item" href="/">Portfolio</a>
      <a class="start-item" href="/flix">Flix</a>
      <a class="start-item" href="/admin" target="_blank" rel="noopener">Admin</a>
      <button class="start-item danger" id="lock-btn">Lock</button>
    </aside>

    <footer class="taskbar">
      <button id="start-btn" class="taskbar-start">Start</button>
      <div id="taskbar-apps" class="taskbar-apps"></div>
      <div class="taskbar-right">
        <span id="taskbar-clock">00:00</span>
      </div>
    </footer>
  </div>

  <template id="window-template">
    <section class="app-window" data-app-window>
      <header class="window-header" data-drag-handle>
        <div class="window-title">App</div>
        <div class="window-controls">
          <button type="button" data-action="minimize">_</button>
          <button type="button" data-action="close">x</button>
        </div>
      </header>
      <div class="window-body"></div>
    </section>
  </template>

  <script src="/static/os/os.js"></script>
</body>
</html>
